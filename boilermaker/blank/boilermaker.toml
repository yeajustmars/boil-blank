[project]
name = "{{name}}"
version = "{{version}}"
description = "{{description}}"
license = "{{license}}"
authors = [{% for author in authors %} {{author}} {% endfor %}]
website = "{{website}}"
keywords = [{%- for keyword in keywords -%}"{{keyword}}"{%- if not loop.last -%}, {%- endif -%}{%- endfor -%}]

repository = "{{repo}}"
{%- if default_branch -%}
default_branch = "{{default_branch}}"
{%- endif -%}
{%- if default_subdir -%}
default_subdir = "{{default_subdir}}"
{%- endif -%}
{%- if default_name -%}
default_name = "{{default_name}}"
{%- endif -%}
{%- if default_lang -%}
default_lang = "{{default_lang}}"
{%- endif -%}

[variables]
{%- for k,v in variables.items() -%}
{{k}} = "{{v}}"
{%- endfor -%}
